<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="title description">
  <title id="title">Personal AI architecture powered by on-prem open-weight models</title>
  <desc id="description">Ninety enabled jobs transform personal and institutional signals into durable knowledge. Eighty-one inherit the on-prem GLM 5.2 default, nine use DeepSeek for lightweight batch work, and no automation route uses a proprietary model.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="srcFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="actFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#047857" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Top chip badge -->
  <g transform="translate(600, 52)">
    <rect x="-200" y="-23" width="400" height="46" rx="23" ry="23" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="7" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="3" fill="#1e3a8a">PERSONAL AI ARCHITECTURE</text>
  </g>

  <!-- Title -->
  <text x="600" y="128" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="46" font-weight="800" fill="url(#titleGrad)" letter-spacing="-1">Building a Personal AI That Actually Knows You</text>

  <!-- Subtitle -->
  <text x="600" y="166" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="21" font-weight="500" fill="#475569">90 enabled jobs · GLM 5.2 on-prem default · zero proprietary automation routes</text>

  <!-- Column headers -->
  <text x="200" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="19" font-weight="700" letter-spacing="2.5" fill="#1e40af">DATA SOURCES</text>
  <text x="600" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="19" font-weight="700" letter-spacing="2.5" fill="#92400e">KNOWLEDGE &amp; MEMORY</text>
  <text x="1000" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="19" font-weight="700" letter-spacing="2.5" fill="#065f46">AGENT ACTIONS</text>

  <!-- Connector paths (behind boxes) -->
  <g fill="none" stroke-linecap="round" stroke-width="2.5">
    <!-- Sources to knowledge -->
    <path d="M 350,270 C 410,270 400,300 450,300" stroke="url(#srcFlow)" stroke-opacity="0.85"/>
    <path d="M 350,355 C 410,355 400,388 450,388" stroke="url(#srcFlow)" stroke-opacity="0.85"/>
    <path d="M 350,440 C 410,440 400,388 450,388" stroke="url(#srcFlow)" stroke-opacity="0.6"/>
    <path d="M 350,525 C 410,525 400,476 450,476" stroke="url(#srcFlow)" stroke-opacity="0.85"/>
    <path d="M 350,270 C 410,270 400,388 450,388" stroke="url(#srcFlow)" stroke-opacity="0.5"/>
    <path d="M 350,440 C 410,440 400,476 450,476" stroke="url(#srcFlow)" stroke-opacity="0.6"/>

    <!-- Knowledge to actions -->
    <path d="M 750,300 C 810,300 800,270 850,270" stroke="url(#actFlow)" stroke-opacity="0.85"/>
    <path d="M 750,300 C 810,300 800,355 850,355" stroke="url(#actFlow)" stroke-opacity="0.6"/>
    <path d="M 750,388 C 810,388 800,355 850,355" stroke="url(#actFlow)" stroke-opacity="0.85"/>
    <path d="M 750,388 C 810,388 800,440 850,440" stroke="url(#actFlow)" stroke-opacity="0.6"/>
    <path d="M 750,476 C 810,476 800,525 850,525" stroke="url(#actFlow)" stroke-opacity="0.85"/>
    <path d="M 750,476 C 810,476 800,440 850,440" stroke="url(#actFlow)" stroke-opacity="0.6"/>
  </g>

  <!-- LEFT: Data Sources -->
  <g font-family="Inter, -apple-system, system-ui, sans-serif">
    <rect x="50" y="235" width="300" height="70" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="200" y="279" text-anchor="middle" font-size="24" font-weight="700" fill="#1e3a8a">Calendar &amp; email</text>

    <rect x="50" y="320" width="300" height="70" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="200" y="364" text-anchor="middle" font-size="24" font-weight="700" fill="#1e3a8a">Meeting transcripts</text>

    <rect x="50" y="405" width="300" height="70" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="200" y="449" text-anchor="middle" font-size="24" font-weight="700" fill="#1e3a8a">Curated AI feeds</text>

    <rect x="50" y="490" width="300" height="70" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="200" y="534" text-anchor="middle" font-size="24" font-weight="700" fill="#1e3a8a">Campus &amp; team signals</text>
  </g>

  <!-- MIDDLE: Knowledge Layers -->
  <g font-family="Inter, -apple-system, system-ui, sans-serif">
    <rect x="450" y="265" width="300" height="70" rx="14" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
    <text x="600" y="309" text-anchor="middle" font-size="24" font-weight="700" fill="#78350f">Knowledge graph</text>

    <rect x="450" y="353" width="300" height="70" rx="14" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
    <text x="600" y="397" text-anchor="middle" font-size="24" font-weight="700" fill="#78350f">Curated wiki</text>

    <rect x="450" y="441" width="300" height="70" rx="14" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
    <text x="600" y="485" text-anchor="middle" font-size="24" font-weight="700" fill="#78350f">Long-term memory</text>
  </g>

  <!-- RIGHT: Agent Actions -->
  <g font-family="Inter, -apple-system, system-ui, sans-serif">
    <rect x="850" y="235" width="300" height="70" rx="14" fill="#a7f3d0" stroke="#059669" stroke-width="2.5"/>
    <text x="1000" y="279" text-anchor="middle" font-size="24" font-weight="700" fill="#064e3b">Daily briefings</text>

    <rect x="850" y="320" width="300" height="70" rx="14" fill="#a7f3d0" stroke="#059669" stroke-width="2.5"/>
    <text x="1000" y="364" text-anchor="middle" font-size="24" font-weight="700" fill="#064e3b">Real-time answers</text>

    <rect x="850" y="405" width="300" height="70" rx="14" fill="#a7f3d0" stroke="#059669" stroke-width="2.5"/>
    <text x="1000" y="449" text-anchor="middle" font-size="24" font-weight="700" fill="#064e3b">Published artifacts</text>

    <rect x="850" y="490" width="300" height="70" rx="14" fill="#a7f3d0" stroke="#059669" stroke-width="2.5"/>
    <text x="1000" y="534" text-anchor="middle" font-size="24" font-weight="700" fill="#064e3b">Proactive nudges</text>
  </g>

  <!-- Synthesis footer -->
  <g transform="translate(600, 622)">
    <rect x="-380" y="-26" width="760" height="52" rx="26" ry="26" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#475569">81 inherit GLM 5.2 · 9 use DeepSeek for lightweight batch work</text>
  </g>
</svg>
